<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시판 글쓰기</title>
</head>
<body> <h2>게시글 작성하기</h2> <hr> 
	<form action="/Thymeleaf/save" method="get"> 
		<p>제목: <input type="text" name="title" required></p> 
		<p>작성자: <input type="text" name="writer" required></p> 
		<p>내용: <textarea name="content" rows="10" cols="40" required></textarea></p> 
	 <button type="submit">등록 완료</button> </form> 
 	<a th:href="/Thymeleaf/list">목록으로 가기</a> </body>
</html>
